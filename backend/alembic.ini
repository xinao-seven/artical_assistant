# Alembic 数据库迁移配置

[alembic]
# 迁移脚本存放目录
script_location = alembic

# 数据库连接 URL (同步版本, 迁移用)
# 通过环境变量读取，不写死
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/paper_assistant

# 日志配置
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 截断迁移说明
truncate_slug_length = 40

# 设置为 True 以自动生成迁移脚本
# 生产环境建议手动检查
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
